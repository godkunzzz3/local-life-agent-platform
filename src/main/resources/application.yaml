server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
  redis:
    host: 127.0.0.1
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
merchant-agent:
  prompt:
    # Prompt 模板版本。每次调整 Prompt 规则时建议递增，方便排查模型回复差异。
    version: merchant-agent-v2
  model:
    # rule：规则版兜底；langchain4j：通过 LangChain4j 调用阿里云百炼 / DashScope 通义千问。
    provider: langchain4j
    # 推荐放到环境变量 DASHSCOPE_API_KEY，避免把真实 Key 提交到 Git。
    api-key: ${DASHSCOPE_API_KEY:}
    # QwenChatModel 默认会使用 DashScope 服务地址；一般不需要配置 base-url。
    base-url:
    # 百炼可按账号开通情况选择 qwen-turbo、qwen-plus 等模型。
    model-name: qwen-turbo
    temperature: 0.3
    max-tokens: 800
  embedding:
    # Embedding 与聊天模型共用 DashScope API Key。后续也可以单独配置 merchant-agent.embedding.api-key。
    api-key: ${DASHSCOPE_API_KEY:}
    base-url:
    # 第一版使用 Qwen/DashScope 文本向量模型。生成的向量本体保存在 Redis，MySQL 只保存 vector_id。
    model-name: text-embedding-v4
    # 留空时使用模型默认维度；如果账号模型要求固定维度，可以在这里配置。
    dimension:
